<!DOCTYPE html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lookbook</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    background:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100vh; padding:40px 20px;
}
header{ text-align:center; margin-bottom:48px; }
header h1{ font-size:32px; color:#222; margin-bottom:8px; }
header p{ color:#888; font-size:14px; }
.grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px; max-width:960px; margin:0 auto;
}
.card{
    display:block; background:white; border-radius:12px;
    overflow:hidden; text-align:center; text-decoration:none;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
    transition:transform 0.2s,box-shadow 0.2s;
}
.card:hover{ transform:translateY(-4px); box-shadow:0 6px 24px rgba(0,0,0,0.12); }
.card-img{
    width:100%; height:180px; object-fit:cover;
    display:block; background:#f0f0f0;
}
.card-icon{ font-size:36px; padding:32px 20px 12px; display:block; }
.card-title{ font-size:16px; color:#333; font-weight:500; word-break:break-all; padding:12px 20px 20px; }
footer{ text-align:center; color:#bbb; font-size:12px; margin-top:48px; }
</style>
</head>
